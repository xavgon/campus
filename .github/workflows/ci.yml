name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: campus
          POSTGRES_PASSWORD: campus
          POSTGRES_DB: campus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg openssl

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Bootstrap mTLS certificates
        working-directory: server
        run: npm run certs:bootstrap

      - name: Configure environment
        working-directory: server
        run: |
          cp .env.example .env
          {
            echo "DATABASE_URL=postgresql://campus:campus@localhost:5432/campus_test"
            echo "JWT_SECRET=ci-test-secret-change-me"
            echo "MTLS_STRICT=false"
            echo "NODE_ENV=development"
          } >> .env

      - name: Database migrate and seed
        working-directory: server
        run: npm run db:migrate && npm run db:seed

      - name: Typecheck
        working-directory: server
        run: npm run typecheck

      - name: Start API server
        working-directory: server
        run: npm run dev &

      - name: Run RF test suite
        working-directory: server
        run: npm run test:all
